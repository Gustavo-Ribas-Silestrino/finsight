<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinSight — Criar Conta</title>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/modals.css">
</head>
<body class="auth-page">

  <div class="auth-inner">
    <div class="auth-brand">
      <div class="auth-brand_icon">
        <span class="material-symbols-outlined">account_balance_wallet</span>
      </div>
      <div>
        <div class="auth-brand_name">FinSight</div>
        <div class="auth-brand_tagline">Wealth Intelligence</div>
      </div>
    </div>

    <h1 class="auth-heading">Crie sua conta</h1>
    <p class="auth-subheading">Comece sua jornada para a clareza financeira hoje mesmo.</p>

    <form class="auth-form" onsubmit="return false;">
      <div class="auth-field">
        <label class="auth-field_label" for="reg_name">Nome completo</label>
        <div class="auth-field_wrap">
          <span class="material-symbols-outlined auth-field_icon">person</span>
          <input id="reg_name" type="text" class="auth-field_input" placeholder="Ex: João Silva" autocomplete="name">
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-field_label" for="reg_email">E-mail</label>
        <div class="auth-field_wrap">
          <span class="material-symbols-outlined auth-field_icon">alternate_email</span>
          <input id="reg_email" type="email" class="auth-field_input" placeholder="nome@exemplo.com" autocomplete="email">
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-field_label" for="reg_password">Senha</label>
        <div class="auth-field_wrap">
          <span class="material-symbols-outlined auth-field_icon">lock</span>
          <input id="reg_password" type="password" class="auth-field_input" placeholder="••••••••" autocomplete="new-password">
          <button type="button" data-pw-toggle="reg_password" class="auth-field_action">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
        <div class="strength-bars">
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
        </div>
        <span id="strength_label" class="strength-label"></span>
      </div>

      <div class="auth-field">
        <label class="auth-field_label" for="reg_confirm">Confirmar senha</label>
        <div class="auth-field_wrap">
          <span class="material-symbols-outlined auth-field_icon">shield_lock</span>
          <input id="reg_confirm" type="password" class="auth-field_input" placeholder="••••••••" autocomplete="new-password">
        </div>
      </div>

      <label class="auth-terms">
        <input type="checkbox">
        <span class="auth-terms_text">
          Aceito os <a href="#" class="auth-terms_link">Termos de Uso</a> e <a href="#" class="auth-terms_link">Política de Privacidade</a>.
        </span>
      </label>

      <button type="submit" class="auth-btn">
        <span>Criar conta</span>
        <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>
      </button>
    </form>

    <p class="auth-footer">
      Já tem conta? <a href="login.html" class="auth-link">Entrar</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/modals.js"></script>
  <script src="../js/app.js"></script>
  <script>
    if (localStorage.getItem('finsight-session') === 'true') {
      window.location.replace('dashboard.html');
    }

    // Força de senha
    document.getElementById('reg_password').addEventListener('input', function () {
      const v = this.value;
      const bars  = document.querySelectorAll('.strength-bar');
      const label = document.getElementById('strength_label');
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
      if (/\d/.test(v) && /[^A-Za-z0-9]/.test(v)) score++;
      const levels = [
        { color: 'var(--clr-expense)', text: 'Fraca' },
        { color: '#f59e0b',            text: 'Média' },
        { color: 'var(--clr-income)',  text: 'Forte' },
      ];
      bars.forEach((b, i) => {
        b.style.background = i < score ? levels[score - 1].color : 'var(--clr-outline)';
      });
      label.textContent = v.length ? levels[score - 1]?.text ?? '' : '';
      label.style.color = score ? levels[score - 1].color : '';
    });

    document.querySelector('.auth-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn      = this.querySelector('.auth-btn');
      const username = document.getElementById('reg_name').value.trim();
      const email    = document.getElementById('reg_email').value.trim();
      const pass     = document.getElementById('reg_password').value;
      const confirm  = document.getElementById('reg_confirm').value;
      const terms    = this.querySelector('input[type=checkbox]').checked;

      if (!username || !email || !pass || !confirm) return showAuthError('Preencha todos os campos.');
      if (pass !== confirm)   return showAuthError('As senhas não coincidem.');
      if (!terms)             return showAuthError('Aceite os termos para continuar.');

      btn.disabled = true;
      btn.querySelector('span').textContent = 'Criando conta…';

      try {
        await dbRegister(username, email, pass);
        window.location.replace('login.html');
      } catch (err) {
        const msg = err.code === '23505' ? 'Este e-mail já está cadastrado.' : (err.message || 'Erro ao criar conta.');
        showAuthError(msg);
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Criar conta';
      }
    });

    function showAuthError(msg) {
      let el = document.getElementById('auth-error');
      if (!el) {
        el = document.createElement('p');
        el.id = 'auth-error';
        el.style.cssText = 'color:var(--clr-expense);font-size:.85rem;margin-top:-.5rem;text-align:center';
        document.querySelector('.auth-btn').insertAdjacentElement('beforebegin', el);
      }
      el.textContent = msg;
    }
  </script>
</body>
</html>
