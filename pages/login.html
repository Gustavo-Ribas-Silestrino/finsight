<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinSight — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/modals.css">
</head>
<body class="auth-page">

  <div class="auth-inner">
    <div class="auth-brand">
      <div class="auth-brand_icon">
        <span class="material-symbols-outlined">account_balance_wallet</span>
      </div>
      <div>
        <div class="auth-brand_name">FinSight</div>
        <div class="auth-brand_tagline">Wealth Intelligence</div>
      </div>
    </div>

    <h1 class="auth-heading">Bem-vindo de volta</h1>
    <p class="auth-subheading">Entre na sua conta para continuar.</p>

    <form class="auth-form" onsubmit="return false;">
      <div class="auth-field">
        <label class="auth-field_label" for="login_email">E-mail</label>
        <div class="auth-field_wrap">
          <span class="material-symbols-outlined auth-field_icon">alternate_email</span>
          <input id="login_email" type="email" class="auth-field_input" placeholder="seu@email.com" autocomplete="email">
        </div>
      </div>

      <div class="auth-field">
        <label class="auth-field_label" for="login_password">Senha</label>
        <div class="auth-field_wrap">
          <span class="material-symbols-outlined auth-field_icon">lock</span>
          <input id="login_password" type="password" class="auth-field_input" placeholder="••••••••" autocomplete="current-password">
          <button type="button" data-pw-toggle="login_password" class="auth-field_action">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-btn">Entrar</button>
    </form>

    <p class="auth-footer">
      Não tem conta? <a href="register.html" class="auth-link">Criar conta</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/modals.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Redireciona se já estiver logado
    if (localStorage.getItem('finsight-session') === 'true') {
      window.location.replace('dashboard.html');
    }

    document.querySelector('.auth-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn   = this.querySelector('.auth-btn');
      const email = document.getElementById('login_email').value.trim();
      const pass  = document.getElementById('login_password').value;

      if (!email || !pass) return showAuthError('Preencha todos os campos.');

      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const user = await dbLogin(email, pass);
        localStorage.setItem('finsight-user',    JSON.stringify(user));
        localStorage.setItem('finsight-session', 'true');
        window.location.replace('dashboard.html');
      } catch (err) {
        showAuthError(err.message || 'Erro ao entrar. Tente novamente.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    function showAuthError(msg) {
      let el = document.getElementById('auth-error');
      if (!el) {
        el = document.createElement('p');
        el.id = 'auth-error';
        el.style.cssText = 'color:var(--clr-expense);font-size:.85rem;margin-top:-.5rem;text-align:center';
        document.querySelector('.auth-btn').insertAdjacentElement('beforebegin', el);
      }
      el.textContent = msg;
    }
  </script>

</body>
</html>
